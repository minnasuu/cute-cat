version: '3.8'

# 固定项目名称，避免 volume 名称变化
name: cucatopiacom

services:
  db:
    image: postgres:15
    container_name: cucatopia-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: cucatopiacom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cucatopia-backend
    restart: always
    ports:
      - "8002:8002"
    volumes:
      # 持久化上传的图片文件
      - ./backend/uploads:/uploads
    environment:
      PORT: 8002
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/cute_cat
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      DEFAULT_AI_MODEL: ${DEFAULT_AI_MODEL:-qwen}
      JWT_SECRET: ${JWT_SECRET:-cute-cat-secret-key-change-in-production}
      BETA_CODES: ${BETA_CODES:-CAT2026}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cucatopia-frontend
    restart: always
    ports:
      - "4000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
